<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="QR Mirror – Phone Streamer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>QR Mirror · Streamer</title>

  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/mobile.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>" />
</head>
<body>

<div class="mobile-layout">

  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <div class="mobile-header animate-in">
    <div class="mobile-logo">📱</div>
    <div class="mobile-title">QR Mirror</div>
    <div class="mobile-subtitle">Phone Streamer</div>
  </div>

  <!-- ── Room badge ─────────────────────────────────────────────────────────── -->
  <div class="room-badge animate-in" style="animation-delay:0.08s">
    <span class="room-badge-label">Room ID</span>
    <span class="room-badge-id mono" id="room-badge-id">——————</span>
  </div>

  <!-- ── Main action card ───────────────────────────────────────────────────── -->
  <div class="action-card animate-in" style="animation-delay:0.15s">

    <!-- Permission illustration -->
    <div class="permission-illus">
      <div class="phone-icon">🖥️</div>
    </div>

    <!-- Status row -->
    <div class="mobile-status-row">
      <span id="mobile-status" class="status-badge idle">
        <span class="dot"></span>
        <span class="badge-text">Idle</span>
      </span>
      <span class="text-xs dim mono">v1.0.0</span>
    </div>

    <!-- Stats row -->
    <div class="mobile-stats">
      <div class="stat-pill">
        <div class="stat-pill-label">Viewers</div>
        <div class="stat-pill-value" id="stat-viewers">0</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill-label">Time</div>
        <div class="stat-pill-value mono" id="stat-time">00:00:00</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill-label">Res</div>
        <div class="stat-pill-value" id="stat-res">—</div>
      </div>
    </div>

    <!-- Local preview -->
    <div class="preview-section">
      <span class="preview-label">Preview</span>
      <div class="preview-wrap" id="preview-wrap">
        <video id="local-preview" autoplay muted playsinline style="display:none"></video>
        <span class="preview-placeholder" id="preview-placeholder">No active stream</span>
      </div>
    </div>

    <!-- Big action button -->
    <button class="stream-btn" id="stream-btn">
      <span id="btn-label">📡 Start Sharing</span>
    </button>

    <!-- Hint text -->
    <p class="text-xs dim" style="text-align:center;line-height:1.6;">
      Tap <strong style="color:var(--text-sec)">Start Sharing</strong> and allow screen recording when prompted.<br/>
      Your screen will stream to the PC in real time.
    </p>

  </div>

  <!-- ── Log section ───────────────────────────────────────────────────────── -->
  <div class="mobile-log-section animate-in" style="animation-delay:0.22s">
    <div class="mobile-log-header">
      <span class="mobile-log-title">Event Log</span>
      <button class="btn text-xs" style="padding:3px 8px;" onclick="document.getElementById('mobile-log').innerHTML=''">Clear</button>
    </div>
    <div class="log-panel" id="mobile-log">
      <span class="log-line debug">[system] Mobile streamer initialising…</span>
    </div>
  </div>

</div><!-- /.mobile-layout -->

<!-- Error toast -->
<div class="toast" id="error-toast"></div>

<!-- Socket.IO client -->
<script src="/socket.io/socket.io.js"></script>

<!-- ES module entry -->
<script type="module" src="/js/mobile.js"></script>

</body>
</html>
